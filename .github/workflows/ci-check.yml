# main 머지 전 npm ci + build 검증. 배포(deploy.yml)가 이 에러를 처음 발견하는
# 지점이 되지 않도록, PR/브랜치 push 단계에서 미리 잡는다.
name: CI Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop, "feature/**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export + sitemap)
        run: npm run build
